<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Game Zé da Tipagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Typing Game 🔥</h1>

        <div id="quoteDisplay" class="quote-display"></div>

        <textarea id="quoteInput" class="quote-input" placeholder="Comece a digitar..." autofocus></textarea>

        <div class="stats">
            <span id="timer">Tempo: 0s</span>
            <span id="wpm">WPM: 0</span>
            <span id="accuracy">Acurácia: 0%</span>
        </div>

        <button id="restartBtn" class="btn">Reiniciar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
